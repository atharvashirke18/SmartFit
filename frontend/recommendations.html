<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recommendations | SmartFit</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { primary: "#da7756", primaryHover: "#c26344", surface: "#ffffff", background: "#fdfbf7", accentBg: "#f6ede8" }, 
                    fontFamily: { sans: ["Inter", "sans-serif"] } 
                } 
            } 
        }
    </script>
</head>
<body class="font-sans bg-background text-stone-800 min-h-screen flex flex-col antialiased">
    
    <header class="bg-background border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded border border-stone-200 bg-white flex items-center justify-center">
                    <span class="material-symbols-outlined text-stone-800 text-lg">work</span>
                </div>
                <span class="text-lg font-bold tracking-tight text-stone-800">SmartFit</span>
            </div>
            <nav class="hidden md:flex gap-8 text-sm font-medium text-stone-500">
                <a href="index.html" class="hover:text-stone-900 transition-colors">Home</a>
                <a href="recommendations.html" class="text-stone-900 font-semibold border-b-2 border-primary pb-0.5">Recommendations</a>
                <a href="skill-analysis.html" class="hover:text-stone-900 transition-colors">Skill Analysis</a>
            </nav>
            <div class="w-8 h-8 rounded-full bg-white border border-stone-200 flex items-center justify-center text-stone-600 cursor-pointer hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-sm">person</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 w-full flex-grow">
        
        <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-stone-200 pb-6">
            <div>
                <h1 class="text-2xl font-bold text-stone-800 mb-1">Top Matches</h1>
                <p id="subtitle" class="text-sm text-stone-500">Curated opportunities based on your profile.</p>
            </div>
            <a href="index.html" class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-stone-200 rounded-lg text-sm font-medium text-stone-600 hover:bg-stone-50 transition-colors">
                <span class="material-symbols-outlined text-sm">edit</span> Revise Search
            </a>
        </div>

        <div id="loadingState" class="flex flex-col items-center justify-center py-32">
            <div class="w-8 h-8 border-2 border-stone-200 border-t-primary rounded-full animate-spin mb-4"></div>
            <p class="text-sm font-medium text-stone-500">Analyzing job descriptions...</p>
        </div>

        <div id="errorState" class="hidden flex-col items-center py-20">
            <span class="material-symbols-outlined text-stone-400 text-3xl mb-3">error</span>
            <p id="errorMessage" class="text-sm text-stone-600 text-center mb-6"></p>
            <a href="index.html" class="px-5 py-2 bg-stone-800 text-white rounded-lg text-sm font-medium hover:bg-stone-900">Return Home</a>
        </div>

        <div id="jobGrid" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
    </main>

    <footer class="border-t border-stone-200 py-8 text-center text-xs font-medium text-stone-500 bg-background mt-auto">
        © 2026 SmartFit Intelligence
    </footer>

    <script>
        const API_BASE_URL = "http://localhost:5000/api";

        function createJobCard(job) {
            const resourcesHtml = job.learning_resources && job.learning_resources.length > 0 
                ? job.learning_resources.map(res => `
                    <a href="${res.link}" target="_blank" class="px-2.5 py-1 bg-accentBg text-primary hover:bg-primary hover:text-white transition-colors text-[11px] font-medium rounded flex items-center gap-1 border border-primary/10">
                        Learn ${res.skill}
                    </a>
                  `).join("")
                : '<span class="text-xs text-green-600 font-medium flex items-center gap-1">Perfect match. No skill gaps detected.</span>';

            return `
            <div class="bg-white rounded-xl border border-stone-200 p-6 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-xs font-semibold text-stone-400 mb-1 uppercase tracking-wide">${job.company}</p>
                            <h3 class="text-lg font-bold text-stone-800 leading-tight">${job.title}</h3>
                        </div>
                        <div class="px-2 py-1 rounded border border-stone-200 bg-background text-xs font-bold text-stone-600">
                            ${job.selection_probability}% Fit
                        </div>
                    </div>

                    <div class="flex flex-wrap items-center gap-4 text-xs text-stone-500 mb-6">
                        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px] text-stone-400">location_on</span> ${job.location}</span>
                        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px] text-stone-400">payments</span> $${(job.salary_min/1000).toFixed(0)}k - $${(job.salary_max/1000).toFixed(0)}k</span>
                        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px] text-stone-400">work_history</span> ${job.experience_level}</span>
                    </div>

                    <div class="mb-6">
                        <div class="flex flex-wrap gap-1.5">
                            ${job.matching_skills.map(skill => `<span class="px-2 py-1 bg-stone-100 text-stone-700 text-[11px] font-medium rounded border border-stone-200">${skill}</span>`).join("")}
                            ${job.missing_skills.slice(0, 3).map(skill => `<span class="px-2 py-1 bg-white text-stone-400 text-[11px] font-medium rounded border border-dashed border-stone-300">${skill}</span>`).join("")}
                        </div>
                    </div>

                    <div class="p-4 rounded-lg bg-background border border-stone-100 mb-6">
                        <p class="text-[10px] font-semibold text-stone-400 mb-2 uppercase tracking-wide">Recommended Upskilling</p>
                        <div class="flex flex-wrap gap-2">${resourcesHtml}</div>
                    </div>
                </div>

                <a href="${job.apply_link}" target="_blank" class="w-full h-10 bg-stone-800 hover:bg-stone-900 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                    Apply to Role
                    <span class="material-symbols-outlined text-[16px]">open_in_new</span>
                </a>
            </div>`;
        }

        async function loadRecommendations() {
            try {
                const searchDataStr = localStorage.getItem("searchData");
                if (!searchDataStr) return showError("No search parameters found. Please return home.");

                const searchData = JSON.parse(searchDataStr);
                document.getElementById("subtitle").textContent = `Curated opportunities based on your skills: ${searchData.skills}`;

                const response = await fetch(`${API_BASE_URL}/recommend`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        skills: searchData.skills, experience_years: parseInt(searchData.experience),
                        expected_salary: parseInt(searchData.salary), preferred_location: searchData.location, top_n: 12
                    })
                });

                const data = await response.json();
                if (data.success && data.recommendations.length > 0) {
                    localStorage.setItem("latestRecommendations", JSON.stringify(data.recommendations));
                    document.getElementById("loadingState").classList.add("hidden");
                    const grid = document.getElementById("jobGrid");
                    grid.classList.remove("hidden");
                    grid.innerHTML = data.recommendations.map(createJobCard).join("");
                } else { showError("No matching jobs found in the database."); }
            } catch (e) { showError("Unable to connect to the prediction engine."); }
        }

        function showError(msg) {
            document.getElementById("loadingState").classList.add("hidden");
            document.getElementById("errorState").classList.remove("hidden");
            document.getElementById("errorMessage").textContent = msg;
        }

        window.addEventListener("DOMContentLoaded", loadRecommendations);
    </script>
</body>
</html>
